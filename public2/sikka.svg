<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="100%" height="100%">
  <defs>
    <linearGradient id="sikkaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9" />
      <stop offset="50%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0.3" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Coin Base -->
  <circle cx="64" cy="64" r="56" fill="#090d16" stroke="url(#sikkaGrad)" stroke-width="4" />
  <circle cx="64" cy="64" r="48" fill="none" stroke="rgba(56, 189, 248, 0.15)" stroke-width="1.5" stroke-dasharray="4 4" />

  <!-- DAG Mesh Node Connections -->
  <g stroke="url(#sikkaGrad)" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)">
    <!-- Central Node S Shape -->
    <path d="M 76 42 C 76 34, 52 34, 52 48 C 52 64, 76 64, 76 80 C 76 94, 52 94, 52 86" fill="none" />
    <!-- Node points -->
    <circle cx="76" cy="42" r="4.5" fill="#38bdf8" />
    <circle cx="52" cy="48" r="4.5" fill="#38bdf8" />
    <circle cx="64" cy="64" r="5" fill="#67e8f9" />
    <circle cx="76" cy="80" r="4.5" fill="#38bdf8" />
    <circle cx="52" cy="86" r="4.5" fill="#38bdf8" />
  </g>

  <!-- Outer Orbit Nodes -->
  <circle cx="36" cy="64" r="3" fill="#0ea5e9" opacity="0.7" />
  <circle cx="92" cy="64" r="3" fill="#0ea5e9" opacity="0.7" />
</svg>
