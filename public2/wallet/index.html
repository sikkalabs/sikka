<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Address · Sikka</title>
  <meta name="description" content="Address explorer view for a Sikka node.">
  <link rel="stylesheet" href="/public/style.css">
</head>
<body>
  <div id="app">
    <div class="app-bg"></div>

    <main class="layout-container">
      <div style="text-align: center; margin-bottom: 1.5rem;">
        <a href="/" class="btn-secondary" style="display: inline-flex; align-items: center; gap: 0.5rem; text-decoration: none; font-size: 0.8125rem;">
          &larr; Return to Node Overview
        </a>
      </div>

      <section class="panel">
        <div class="panel-header">
          <span class="panel-title">ADDRESS DETAILS</span>
        </div>
        <h1 id="pageTitle" style="margin-top: 0.5rem; word-break: break-all; font-family: var(--font-mono); font-size: 1.25rem; font-weight: 700; color: #ffffff; text-align: center;">Loading…</h1>

        <div id="loading" style="margin-top: 1.5rem; color: var(--text-muted); font-size: 0.875rem; text-align: center;">
          Loading address details…
        </div>

        <div id="errorMessage" style="display: none; margin-top: 1.5rem; padding: 1rem 1.5rem; border-radius: 0.75rem; border: 1px solid var(--text-rose); background: rgba(244,63,94,0.1); color: var(--text-rose); font-size: 0.875rem; text-align: center;">
        </div>

        <div id="content" style="display: none; margin-top: 1.5rem; width: 100%;">
          <div id="summaryCards" class="metrics-row" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));">
          </div>

          <section id="utxosSection" style="display: none; margin-top: 1.5rem;">
            <div style="display: flex; align-items: center; justify-content: center; gap: 0.5rem; margin-bottom: 0.75rem;">
              <span class="panel-title">Outputs / UTXOs</span>
              <span id="utxosBadge" class="badge">0</span>
            </div>
            <div id="utxosList" style="display: grid; gap: 0.75rem;">
            </div>
          </section>

          <details style="margin-top: 2rem; cursor: pointer; color: var(--text-muted); font-family: var(--font-mono); font-size: 0.8125rem;">
            <summary style="padding: 0.5rem 0;">View Raw JSON</summary>
            <pre id="rawJson" style="margin-top: 0.5rem; padding: 1rem; background: rgba(3,7,18,0.8); border: 1px solid var(--border-subtle); border-radius: 0.5rem; overflow-x: auto; color: var(--text-sky);"></pre>
          </details>
        </div>
      </section>
    </main>
  </div>

  <script>
    (function () {
      'use strict';

      const CHILLAR_PER_SIKKA = 10_000_000_000n;

      function toBigIntInteger(value) {
        if (typeof value === 'bigint') return value;
        if (typeof value === 'number') {
          if (!Number.isFinite(value) || !Number.isInteger(value)) return 0n;
          return BigInt(String(value));
        }
        if (typeof value === 'string') {
          const trimmed = value.trim();
          if (!/^-?\d+$/.test(trimmed)) return 0n;
          return BigInt(trimmed);
        }
        return 0n;
      }

      function formatSikka(chillar) {
        const amount = toBigIntInteger(chillar);
        const negative = amount < 0n;
        const abs = negative ? -amount : amount;
        const whole = abs / CHILLAR_PER_SIKKA;
        const frac = abs % CHILLAR_PER_SIKKA;
        return (negative ? '-' : '') + whole.toString() + '.' + frac.toString().padStart(10, '0');
      }

      function extractPathValue(prefix) {
        const segments = window.location.pathname.replace(/^\/+/, '').split('/');
        if (segments[0] !== prefix) {
          return '';
        }
        return segments.slice(1).map(segment => decodeURIComponent(segment)).join('/').trim();
      }

      async function apiFetch(path) {
        const response = await fetch(window.location.origin + path);
        const text = await response.text();
        let data;
        try {
          data = JSON.parse(text);
        } catch {
          data = text;
        }
        let raw;
        try {
          raw = JSON.stringify(JSON.parse(text), null, 2);
        } catch {
          raw = text;
        }
        return { ok: response.ok, status: response.status, data, raw };
      }

      document.addEventListener('DOMContentLoaded', async () => {
        const address = extractPathValue('wallet');
        const pageTitle = document.getElementById('pageTitle');
        const loading = document.getElementById('loading');
        const errorMessage = document.getElementById('errorMessage');
        const content = document.getElementById('content');

        if (!address) {
          loading.style.display = 'none';
          errorMessage.style.display = 'block';
          errorMessage.textContent = 'No address found in the URL.';
          document.title = 'Address · Sikka';
          return;
        }

        document.title = 'Address ' + address + ' · Sikka';
        pageTitle.textContent = address;

        try {
          const res = await apiFetch('/v1/address/' + encodeURIComponent(address));

          if (!res.ok) {
            loading.style.display = 'none';
            errorMessage.style.display = 'block';
            errorMessage.textContent = 'Address not found or error loading details (HTTP ' + res.status + ').';
            return;
          }

          const data = res.data || {};
          const utxos = Array.isArray(data.utxos) ? data.utxos : [];
          const totalBalance = utxos.reduce((sum, u) => sum + toBigIntInteger(u.value || '0'), 0n);

          // Summary
          const summaryCards = document.getElementById('summaryCards');
          summaryCards.innerHTML = `
            <div class="metric-card">
              <p class="metric-label">Total Balance</p>
              <p class="metric-val" style="font-size: 1.25rem; color: var(--text-emerald);">${formatSikka(totalBalance)} SIKKA</p>
            </div>
            <div class="metric-card">
              <p class="metric-label">UTXO Count</p>
              <p class="metric-val" style="font-size: 1.25rem;">${utxos.length}</p>
            </div>
          `;

          // UTXOs
          if (utxos.length) {
            document.getElementById('utxosSection').style.display = 'block';
            document.getElementById('utxosBadge').textContent = utxos.length;
            document.getElementById('utxosList').innerHTML = utxos.map(u => `
              <div class="metric-card">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                  <span class="badge badge-emerald">${formatSikka(u.value)} SIKKA</span>
                  <span class="metric-sub">Depth: ${u.dag_depth ?? '—'}</span>
                </div>
                <a href="/tx/${encodeURIComponent(u.txid)}" class="tip-hash" style="display: block; margin-top: 0.5rem; color: var(--text-sky); text-decoration: underline;">
                  ${u.txid}:${u.index}
                </a>
              </div>
            `).join('');
          }

          document.getElementById('rawJson').textContent = res.raw;

          loading.style.display = 'none';
          content.style.display = 'block';
        } catch (err) {
          loading.style.display = 'none';
          errorMessage.style.display = 'block';
          errorMessage.textContent = 'Failed to load address details: ' + String(err.message || err);
        }
      });
    })();
  </script>
</body>
</html>
